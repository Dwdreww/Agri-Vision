services:
  - type: web
    name: agri-vision-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180
    envVars:
      - key: AGRI_VISION_ALLOWED_ORIGINS
        value: https://dwdreww.github.io
      - key: AGRI_VISION_API_KEY
        sync: false
